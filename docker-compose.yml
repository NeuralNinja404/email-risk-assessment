services:
  # --- Infrastructure ---
  kafka:
    image: bitnami/kafka:3.7
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/bitnami/kafka
    networks:
      - email-risk-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka-init:
    image: bitnami/kafka:3.7
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic tasks.extract --partitions 3 --replication-factor 1
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic tasks.score --partitions 3 --replication-factor 1
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic tasks.policy --partitions 3 --replication-factor 1
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic tasks.audit --partitions 3 --replication-factor 1
        echo "Topics created."
    networks:
      - email-risk-net

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-emailrisk}
      POSTGRES_USER: ${POSTGRES_USER:-emailrisk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-emailrisk_secret}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - email-risk-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-emailrisk}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - email-risk-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Application Services ---
  ingest:
    build:
      context: .
      dockerfile: services/ingest/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - attachment_data:/data/attachments
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks:
      - email-risk-net
    restart: unless-stopped

  extractor:
    build:
      context: .
      dockerfile: services/extractor/Dockerfile
    env_file: .env
    volumes:
      - attachment_data:/data/attachments:ro
      - yara_rules:/app/yara_rules:ro
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks:
      - email-risk-net
    restart: unless-stopped

  scoring:
    build:
      context: .
      dockerfile: services/scoring/Dockerfile
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks:
      - email-risk-net
    restart: unless-stopped

  policy:
    build:
      context: .
      dockerfile: services/policy/Dockerfile
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks:
      - email-risk-net
    restart: unless-stopped

  audit:
    build:
      context: .
      dockerfile: services/audit/Dockerfile
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks:
      - email-risk-net
    restart: unless-stopped

volumes:
  kafka_data:
  pg_data:
  redis_data:
  attachment_data:
  yara_rules:

networks:
  email-risk-net:
    driver: bridge
